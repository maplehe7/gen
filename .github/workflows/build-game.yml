name: Build Game For Pages
run-name: ${{ github.event_name == 'workflow_dispatch' && inputs.request_id || 'Build Game For Pages' }}

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-game.yml"
      - "build_pages_site.py"
      - "capture_game_thumbnail.py"
      - "game_catalog.json"
      - "site/**"
      - "unity_standalone.py"
      - "verify_generated_game.py"
  workflow_dispatch:
    inputs:
      source_url:
        description: "Game URL to export"
        required: false
        type: string
      display_name:
        description: "Display name for the exported game"
        required: false
        type: string
      request_id:
        description: "Browser-generated request identifier"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: standalone-forge-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore previous Pages state
        run: |
          mkdir -p state
          if git ls-remote --exit-code --heads origin pages-state; then
            git fetch origin pages-state
            git archive origin/pages-state | tar -x -C state
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install brotli playwright
          python -m playwright install --with-deps chromium

      - name: Resolve workflow inputs
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8"))
          inputs = event.get("inputs") or {}
          env_path = Path(os.environ["GITHUB_ENV"])
          pairs = {
              "SOURCE_URL": str(inputs.get("source_url", "")).replace("\n", " ").strip(),
              "DISPLAY_NAME": str(inputs.get("display_name", "")).replace("\n", " ").strip(),
              "REQUEST_ID": str(inputs.get("request_id", "")).replace("\n", " ").strip(),
          }
          with env_path.open("a", encoding="utf-8") as handle:
              for key, value in pairs.items():
                  handle.write(f"{key}={value}\n")
          PY

      - name: Build or update Pages site
        run: |
          python build_pages_site.py \
            --state-dir state \
            --dist-dir dist \
            --source-url "$SOURCE_URL" \
            --display-name "$DISPLAY_NAME" \
            --request-id "$REQUEST_ID"

      - name: Persist Pages state branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          git init
          git checkout -b pages-state
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit --allow-empty -m "Update Pages state"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin pages-state

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
