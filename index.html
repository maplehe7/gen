<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Standalone Forge</title>
    <link rel="stylesheet" href="./app.css?v=20260314-1" />
  </head>
  <body>
    <div class="page-shell">
      <main class="stack">
        <form id="export-form" class="panel dashboard-band">
          <div class="dashboard-band-main stack">
            <div>
              <p class="panel-kicker">Search Console</p>
              <h1 class="panel-title">Resolve candidates before you queue builds</h1>
            </div>

            <div class="export-form">
              <div class="source-input-wrap">
                <input
                  id="source"
                  name="source"
                  type="text"
                  placeholder="Game URL or name"
                  autocomplete="off"
                  required
                />
              </div>
              <label class="candidate-count-control" for="candidate-count">
                <span>Candidates</span>
                <select id="candidate-count" name="candidate-count">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3" selected>3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                </select>
              </label>
              <button
                id="bulk-toggle"
                class="bulk-corner-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="bulk-panel"
                title="Add multiple games"
              ></button>
              <div class="form-actions">
                <button id="submit-button" class="submit-button" type="submit">Resolve candidates</button>
                <button id="dispatch-button" class="job-link" type="button">Dispatch selected</button>
                <button id="clear-review-button" class="job-link secondary" type="button">Clear review</button>
              </div>
              <div id="bulk-panel" class="bulk-panel" hidden>
                <textarea
                  id="source-list"
                  name="source-list"
                  rows="6"
                  placeholder="One game name or URL per line"
                  spellcheck="false"
                ></textarea>
              </div>
            </div>
          </div>
          <div class="dashboard-band-side stack compact-stack">
            <p id="repo-target" class="status-chip"></p>
            <p id="config-warning" class="helper-text"></p>
            <p id="form-message" class="form-message" aria-live="polite"></p>

            <div class="dashboard-stats">
              <div class="dashboard-stat">
                <span class="dashboard-stat-label">Active</span>
                <strong id="dashboard-active-count" class="dashboard-stat-value"></strong>
              </div>
              <div class="dashboard-stat">
                <span class="dashboard-stat-label">Review</span>
                <strong id="dashboard-review-count" class="dashboard-stat-value"></strong>
              </div>
              <div class="dashboard-stat dashboard-stat-wide">
                <span class="dashboard-stat-label">Refresh</span>
                <strong id="dashboard-refresh-status" class="dashboard-stat-value"></strong>
              </div>
            </div>

            <div class="mini-nav">
              <a class="job-link secondary" href="./gallery.html">Gallery</a>
            </div>
          </div>
        </form>

        <section id="candidate-preview" class="panel preview-panel" hidden>
          <div class="preview-header">
            <div>
              <p class="panel-kicker">Candidate Preview</p>
              <h2 class="panel-title">Resolved before dispatch</h2>
              <p id="candidate-preview-copy" class="preview-copy"></p>
            </div>
            <p id="candidate-preview-status" class="preview-status"></p>
          </div>
          <div id="candidate-preview-list" class="preview-list"></div>
        </section>

        <div id="jobs" class="jobs-grid"></div>
      </main>
    </div>

    <div id="favorite-modal" class="favorite-modal" hidden>
      <div class="favorite-dialog">
        <div class="favorite-header">
          <p class="favorite-kicker">All candidates finished</p>
          <h2 id="favorite-title" class="favorite-title">Pick the one you want to keep</h2>
          <p id="favorite-copy" class="favorite-copy"></p>
        </div>
        <div id="favorite-grid" class="favorite-grid"></div>
        <p id="favorite-status" class="favorite-status" aria-live="polite"></p>
      </div>
    </div>

    <template id="job-template">
      <article class="job-card">
        <div class="job-topline">
          <div class="job-heading">
            <p class="job-rank"></p>
            <h3 class="job-title"></h3>
            <p class="job-subtitle"></p>
          </div>
          <div class="job-top-actions">
            <p class="job-percent"></p>
            <div class="job-header-actions"></div>
          </div>
        </div>

        <div class="meter">
          <div class="meter-fill"></div>
        </div>

        <div class="job-meta">
          <p class="job-status"></p>
          <p class="job-phase"></p>
          <p class="job-eta"></p>
        </div>

        <div class="job-actions"></div>
        <p class="job-error"></p>
      </article>
    </template>

    <script src="./config.js?v=20260314-1"></script>
    <script type="module" src="./app.js?v=20260314-1"></script>
  </body>
</html>
