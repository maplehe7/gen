<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Standalone Forge</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="stack">
        <section class="panel panel-form">
          <form id="export-form" class="export-form">
            <input
              id="source"
              name="source"
              type="text"
              placeholder="Game URL or name"
              autocomplete="off"
              required
            />
            <button id="submit-button" class="submit-button" type="submit">
              Generate
            </button>
          </form>
          <p id="repo-target" class="status-chip"></p>
          <p id="config-warning" class="helper-text"></p>
          <p id="form-message" class="form-message" aria-live="polite"></p>
        </section>

        <section class="jobs-section">
        <div class="section-head">
          <h2>Recent Requests</h2>
        </div>
        <div id="jobs" class="jobs-grid"></div>
        </section>

        <section class="jobs-section">
        <div class="section-head">
          <h2>Published Games</h2>
        </div>
        <div id="published-games" class="jobs-grid"></div>
        </section>
      </main>
    </div>

    <template id="job-template">
      <article class="job-card">
        <div class="job-topline">
          <div>
            <p class="job-status"></p>
            <h3 class="job-title"></h3>
          </div>
          <p class="job-percent"></p>
        </div>

        <div class="meter">
          <div class="meter-fill"></div>
        </div>

        <div class="job-meta">
          <p class="job-phase"></p>
          <p class="job-eta"></p>
        </div>

        <dl class="job-facts">
          <div>
            <dt>Source</dt>
            <dd class="job-source"></dd>
          </div>
          <div>
            <dt>Request</dt>
            <dd class="job-request"></dd>
          </div>
          <div>
            <dt>Repository</dt>
            <dd class="job-repo"></dd>
          </div>
        </dl>

        <div class="job-actions"></div>
        <p class="job-error"></p>
      </article>
    </template>

    <template id="published-template">
      <article class="job-card published-card">
        <div class="job-topline">
          <div>
            <p class="job-status">Published</p>
            <h3 class="job-title"></h3>
          </div>
        </div>

        <dl class="job-facts">
          <div>
            <dt>Source</dt>
            <dd class="job-source"></dd>
          </div>
          <div>
            <dt>Folder</dt>
            <dd class="job-folder"></dd>
          </div>
          <div>
            <dt>Built</dt>
            <dd class="job-built"></dd>
          </div>
        </dl>

        <div class="job-actions"></div>
      </article>
    </template>

    <script src="./config.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
